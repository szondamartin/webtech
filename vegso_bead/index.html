<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Taxi Regisztráló</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>


<header class="page-header">
  <div>
    <h1>Taxi Regisztráló</h1>
    <p class="subtitle">Autó nyilvántartó rendszer</p>
  </div>

  <button id="refreshBtn" class="btn btn-primary">Frissítés</button>
</header>

<main class="layout">

  <aside class="sidebar card">
    <h2>Szűrés</h2>

    <div class="stack">

      <label>ID</label>
      <input id="filterId" type="number" placeholder="pl: 1">

      <label>Márka</label>
      <input id="filterBrand" placeholder="pl: Toyota">

      <label>Modell</label>
      <input id="filterModel" placeholder="pl: Aygo">

      <label>Tulajdonos</label>
      <input id="filterOwner" placeholder="pl: John Smith">

      <button id="filterBtn" type="button" class="btn btn-secondary">
        Szűrés alkalmazása
      </button>

    </div>
  </aside>


  <section class="content">


    <div class="card section-header">
      <h2>Rekordok</h2>

      <button id="openCreateModalBtn" class="btn btn-success">
        Új autó
      </button>
    </div>


    <div id="messageBox" class="message" style="display:none;"></div>


    <div class="card table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Márka</th>
            <th>Modell</th>
            <th>Műveletek</th>
          </tr>
        </thead>

        <tbody id="tableBody">
          <tr>
            <td colspan="4">Betöltés...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </section>

</main>

<div id="createModal" class="modal-backdrop" style="display:none;">
  <div class="modal">

    <div class="modal-header">
      <h2 id="modalTitle">Új autó</h2>
      <button id="closeModalBtn" class="icon-btn">×</button>
    </div>

    <form id="recordForm" class="stack">

      <input type="hidden" id="recordId">

      <label>Márka</label>
      <input id="nameInput" required>

      <label>Modell</label>
      <input id="descriptionInput" required>

      <label>Fogyasztás</label>
      <input type="number" id="fuelUseInput" step="0.1" required>

      <label>Tulajdonos</label>
      <input id="ownerInput" required placeholder="pl: John Smith">

      <label>Forgalomba helyezés</label>
      <input type="date" id="dateInput" required>

      <label>Elektromos</label>
      <input type="checkbox" id="electricInput">

      <div class="form-actions">
        <button type="button" id="cancelModalBtn" class="btn btn-secondary">
          Mégse
        </button>

        <button type="submit" class="btn btn-primary">
          Mentés
        </button>
      </div>

    </form>

  </div>
</div>


<div id="detailsModal" class="modal-backdrop" style="display:none;">
  <div class="modal">

    <div class="modal-header">
      <h2>Részletek</h2>
      <button id="closeDetailsBtn" class="icon-btn">×</button>
    </div>

    <div id="detailsModalContent"></div>

  </div>
</div>


<footer class="page-footer">
  <small>
    Szonda Martin - CDEDOT
  </small>
</footer>


<script type="module" src="js/app.js"></script>

</body>
</html>
